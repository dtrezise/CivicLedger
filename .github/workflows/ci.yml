name: CI

on:
  push:
  pull_request:

jobs:
  public-release-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ranking dependencies
        run: python -m pip install -e ./backend
      - name: Validate public data, schemas, and provenance
        run: python scripts/check_public_release_dataset.py
      - name: Validate trade-event ranking benchmark
        env:
          PYTHONPATH: backend
        run: python scripts/evaluate_event_ranking.py --output /tmp/event-ranking-benchmark.json
      - name: Validate static accessibility and responsive contracts
        run: python scripts/check_release_accessibility.py
      - name: Validate static interaction and URL-state contracts
        run: python scripts/check_release_static_contract.py
      - name: Validate static links and official provenance hosts
        run: python scripts/check_release_links.py
      - name: Enforce Pages performance budgets
        run: python scripts/check_release_performance.py
      - name: Validate Workers Static Assets limits
        run: python scripts/check_cloudflare_assets.py
      - name: Validate deterministic generated JSON
        run: python scripts/check_release_determinism.py
      - name: Verify release checksum inventory
        run: python scripts/build_release_checksum_inventory.py --check

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install backend
        run: python -m pip install -e ".[test]"
      - name: Compile backend
        run: python -m compileall app
      - name: Test backend
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
          run_install: false
      - name: Install frontend
        run: pnpm install --frozen-lockfile
      - name: Build frontend
        run: pnpm build
      - name: Install Pages browser
        run: pnpm exec playwright install --with-deps chromium
      - name: Test Pages interactions at desktop and mobile sizes
        run: pnpm test:pages

  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: civicledger
          POSTGRES_USER: civicledger
          POSTGRES_PASSWORD: civicledger
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U civicledger"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install backend
        run: python -m pip install -e ".[test]"
      - name: Run migrations
        env:
          DATABASE_URL_SYNC: postgresql://civicledger:civicledger@localhost:5432/civicledger
          DATABASE_URL: postgresql+asyncpg://civicledger:civicledger@localhost:5432/civicledger
        run: alembic upgrade head

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Docker smoke
        run: ./scripts/docker_smoke.sh
