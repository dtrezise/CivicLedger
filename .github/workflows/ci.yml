name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install backend
        run: python -m pip install -e ".[test]"
      - name: Compile backend
        run: python -m compileall app
      - name: Test backend
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
          run_install: false
      - name: Install frontend
        run: pnpm install --frozen-lockfile
      - name: Build frontend
        run: pnpm build

  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: civicledger
          POSTGRES_USER: civicledger
          POSTGRES_PASSWORD: civicledger
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U civicledger"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install backend
        run: python -m pip install -e ".[test]"
      - name: Run migrations
        env:
          DATABASE_URL_SYNC: postgresql://civicledger:civicledger@localhost:5432/civicledger
          DATABASE_URL: postgresql+asyncpg://civicledger:civicledger@localhost:5432/civicledger
        run: alembic upgrade head

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Docker smoke
        run: ./scripts/docker_smoke.sh
