name: Deploy Cloudflare Pilot

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pilot
  cancel-in-progress: false

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: cloudflare-pilot
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install release validation dependencies
        run: python -m pip install -e ./backend
      - name: Validate public data and provenance
        run: python scripts/check_public_release_dataset.py
      - name: Validate trade-event ranking benchmark
        env:
          PYTHONPATH: backend
        run: python scripts/evaluate_event_ranking.py --output /tmp/event-ranking-benchmark.json
      - name: Validate static release contracts
        run: |
          python scripts/check_release_accessibility.py
          python scripts/check_release_static_contract.py
          python scripts/check_release_links.py
          python scripts/check_release_performance.py
          python scripts/check_release_determinism.py
          python scripts/build_release_checksum_inventory.py --check
      - name: Validate Workers Static Assets limits
        run: python scripts/check_cloudflare_assets.py
      - name: Deploy Workers Static Assets pilot
        id: deployment
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.jsonc
      - name: Publish pilot URL
        env:
          DEPLOYMENT_URL: ${{ steps.deployment.outputs.deployment-url }}
        run: echo "Cloudflare pilot deployed to $DEPLOYMENT_URL" >> "$GITHUB_STEP_SUMMARY"
