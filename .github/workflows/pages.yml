name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "pages-site/**"
      - "scripts/build_pages_dataset.py"
      - "scripts/build_public_officials_dataset.py"
      - "data/public_officials/**"
      - "backend/app/seed.py"
      - "backend/app/fixtures/**"
      - "backend/app/services/official_sources.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install backend model dependencies
        run: python -m pip install -e ./backend
      - name: Build static Pages dataset
        env:
          PYTHONPATH: backend
        run: python scripts/build_pages_dataset.py
      - uses: actions/configure-pages@v6
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v5
        with:
          path: pages-site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
