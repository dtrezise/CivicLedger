name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "pages-site/**"
      - "scripts/build_pages_dataset.py"
      - "scripts/check_public_release_dataset.py"
      - "scripts/check_release_*.py"
      - "scripts/build_public_officials_dataset.py"
      - "scripts/build_fred_context_dataset.py"
      - "scripts/build_market_price_dataset.py"
      - "scripts/build_crypto_price_dataset.py"
      - "scripts/build_federal_events_dataset.py"
      - "scripts/build_house_historical_transaction_index.py"
      - "scripts/build_supreme_court_historical_decisions.py"
      - "scripts/build_house_disclosure_index.py"
      - "scripts/build_house_ptr_transactions.py"
      - "scripts/build_presidential_oge_disclosure_index.py"
      - "scripts/build_presidential_oge_documents.py"
      - "scripts/build_senate_disclosure_index.py"
      - "scripts/build_senate_ptr_transactions.py"
      - "scripts/build_asset_resolution_dataset.py"
      - "scripts/build_trade_market_reactions.py"
      - "scripts/evaluate_event_ranking.py"
      - "scripts/build_historical_news_context.py"
      - "scripts/build_sec_filing_events.py"
      - "scripts/build_sec_issuer_aliases.py"
      - "scripts/build_primary_source_context.py"
      - "scripts/build_official_event_involvement.py"
      - "scripts/build_executive_disclosure_manifest.py"
      - "scripts/build_judicial_disclosure_manifest.py"
      - "scripts/build_entity_reference_dataset.py"
      - "scripts/build_source_snapshot_index.py"
      - "scripts/build_release_checksum_inventory.py"
      - "scripts/build_static_assets.py"
      - "scripts/archive_disclosure_documents.py"
      - "scripts/build_disclosure_ingestion_queue.py"
      - "scripts/build_disclosure_ocr_priority_batches.py"
      - "scripts/build_disclosure_ocr_results.py"
      - "scripts/build_disclosure_amendment_reconciliation.py"
      - "scripts/build_disclosure_retrieval_batches.py"
      - "scripts/build_reviewed_disclosure_promotions.py"
      - "scripts/build_production_trade_promotions.py"
      - "scripts/build_disclosure_completeness_dashboard.py"
      - "scripts/build_source_staleness_alerts.py"
      - "scripts/build_source_refresh_telemetry.py"
      - "scripts/check_source_freshness.py"
      - "data/public_officials/**"
      - "data/context/**"
      - "data/disclosures/**"
      - "data/raw_documents/**"
      - "data/operations/**"
      - "backend/app/seed.py"
      - "backend/app/fixtures/**"
      - "backend/tests/fixtures/parsers/oge_public_sample_fixture.json"
      - "backend/app/services/official_sources.py"
      - "backend/app/services/fred_context.py"
      - "backend/app/services/market_prices.py"
      - "backend/app/services/asset_resolution.py"
      - "backend/app/services/market_reactions.py"
      - "backend/app/services/historical_news.py"
      - "backend/app/services/sec_edgar.py"
      - "backend/app/services/house_disclosures.py"
      - "backend/app/services/house_historical_disclosures.py"
      - "backend/app/services/supreme_court_historical.py"
      - "backend/app/services/promotion.py"
      - "backend/app/services/senate_disclosures.py"
      - "backend/app/services/official_event_involvement.py"
      - "backend/app/services/executive_disclosures.py"
      - "backend/app/services/judicial_disclosures.py"
      - "backend/app/services/entity_reference.py"
      - "backend/app/services/source_snapshots.py"
      - ".github/workflows/data-refresh.yml"
      - ".github/workflows/pages.yml"
  workflow_dispatch:
    inputs:
      deep_determinism:
        description: Rebuild the complete Pages corpus and compare every canonical hash
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install backend model dependencies
        run: python -m pip install -e ./backend
      - name: Check source freshness
        run: python scripts/check_source_freshness.py
      - name: Verify committed content-hashed browser assets
        run: python scripts/build_static_assets.py --check
      - name: Validate public release contract
        run: python scripts/check_public_release_dataset.py
      - name: Validate static accessibility and responsive contracts
        run: python scripts/check_release_accessibility.py
      - name: Validate static interaction and URL-state contracts
        run: python scripts/check_release_static_contract.py
      - name: Enforce Pages performance budgets
        run: python scripts/check_release_performance.py
      - name: Validate deterministic Pages artifacts
        env:
          PYTHONPATH: backend
        run: python scripts/check_release_determinism.py
      - name: Prove deterministic Pages rebuild
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.deep_determinism }}
        env:
          PYTHONPATH: backend
        run: python scripts/check_release_determinism.py --rebuild
      - name: Validate static links and official provenance hosts
        run: python scripts/check_release_links.py
      - name: Verify committed release checksum inventory
        run: python scripts/build_release_checksum_inventory.py --check
      - name: Write deployed release metadata
        run: >-
          python scripts/write_release_metadata.py
          --commit "${{ github.sha }}"
          --repository "${{ github.repository }}"
          --run-id "${{ github.run_id }}"
      - uses: actions/configure-pages@v6
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v5
        with:
          path: pages-site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
