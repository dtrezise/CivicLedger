name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "pages-site/**"
      - "scripts/build_pages_dataset.py"
      - "scripts/build_public_officials_dataset.py"
      - "scripts/build_fred_context_dataset.py"
      - "scripts/build_market_price_dataset.py"
      - "scripts/build_crypto_price_dataset.py"
      - "scripts/build_presidential_oge_disclosure_index.py"
      - "scripts/archive_disclosure_documents.py"
      - "scripts/build_disclosure_ingestion_queue.py"
      - "scripts/build_reviewed_disclosure_promotions.py"
      - "scripts/build_disclosure_completeness_dashboard.py"
      - "scripts/check_source_freshness.py"
      - "data/public_officials/**"
      - "data/context/**"
      - "data/disclosures/**"
      - "data/raw_documents/**"
      - "backend/app/seed.py"
      - "backend/app/fixtures/**"
      - "backend/tests/fixtures/parsers/oge_public_sample_fixture.json"
      - "backend/app/services/official_sources.py"
      - "backend/app/services/fred_context.py"
      - "backend/app/services/market_prices.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install backend model dependencies
        run: python -m pip install -e ./backend
      - name: Build disclosure source pipeline artifacts
        env:
          PYTHONPATH: backend
        run: |
          python scripts/build_disclosure_ingestion_queue.py
          python scripts/build_reviewed_disclosure_promotions.py
          python scripts/build_disclosure_completeness_dashboard.py
      - name: Check source freshness
        run: python scripts/check_source_freshness.py
      - name: Build static Pages dataset
        env:
          PYTHONPATH: backend
        run: python scripts/build_pages_dataset.py
      - uses: actions/configure-pages@v6
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v5
        with:
          path: pages-site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
