name: Deploy Cloudflare Production

on:
  workflow_run:
    workflows: ["CI", "Refresh Live Context Data"]
    types: [completed]
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

jobs:
  validate-and-deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: cloudflare-production
      url: https://civic-ledger.dan-a2c.workers.dev/
    steps:
      - uses: actions/checkout@v7
        with:
          ref: >-
            ${{ github.event_name == 'workflow_run' &&
                github.event.workflow_run.name == 'CI' &&
                github.event.workflow_run.head_sha ||
                'main' }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
          run_install: false
      - name: Capture release identity
        id: release
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"
      - name: Install release validation dependencies
        run: python -m pip install -e ./backend
      - name: Validate public data and provenance
        id: public_data
        run: python scripts/check_public_release_dataset.py
      - name: Validate trade-event ranking benchmark
        id: ranking
        env:
          PYTHONPATH: backend
        run: python scripts/evaluate_event_ranking.py --output /tmp/event-ranking-benchmark.json
      - name: Validate deterministic static browser assets
        id: static_assets
        run: python scripts/build_static_assets.py --check
      - name: Validate static release contracts
        id: static_contracts
        run: |
          python scripts/check_release_accessibility.py
          python scripts/check_release_static_contract.py
          python scripts/check_release_links.py
          python scripts/check_release_performance.py
          python scripts/check_release_determinism.py
          python scripts/build_release_checksum_inventory.py --check
      - name: Write deployed release metadata
        run: >-
          python scripts/write_release_metadata.py
          --commit "${{ steps.release.outputs.sha }}"
      - name: Validate and report Workers Static Assets footprint
        id: footprint
        run: |
          python scripts/check_cloudflare_assets.py \
            --baseline docs/metrics/cloudflare_asset_baseline.json \
            --report .release-artifacts/cloudflare-assets.json \
            --markdown >> "$GITHUB_STEP_SUMMARY"
      - name: Deploy Workers Static Assets production
        id: deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx --yes wrangler@4.110.0 deploy --config wrangler.jsonc \
            --message "GitHub ${{ steps.release.outputs.short_sha }}"
          npx --yes wrangler@4.110.0 versions list --json --config wrangler.jsonc \
            > .release-artifacts/cloudflare-versions.json
          npx --yes wrangler@4.110.0 deployments status --json --config wrangler.jsonc \
            > .release-artifacts/cloudflare-deployment-status.json
      - name: Verify deployed HTTP, data, metadata, security, and caching
        id: smoke
        run: >-
          python scripts/smoke_cloudflare_release.py
          --base-url https://civic-ledger.dan-a2c.workers.dev/
          --expected-commit "${{ steps.release.outputs.sha }}"
          --output .release-artifacts/cloudflare-smoke.json
      - name: Install mobile production browser smoke runtime
        id: mobile_runtime
        run: |
          pnpm --dir frontend install --frozen-lockfile
          pnpm --dir frontend exec playwright install --with-deps chromium
      - name: Verify live mobile production workbench
        id: mobile_smoke
        env:
          PRODUCTION_BASE_URL: https://civic-ledger.dan-a2c.workers.dev/
        run: ./scripts/production_browser_smoke.sh
      - name: Verify rollback readiness
        id: readiness
        if: ${{ always() && steps.deploy.outcome == 'success' }}
        run: >-
          python scripts/verify_cloudflare_rollback.py
          --versions .release-artifacts/cloudflare-versions.json
          --status .release-artifacts/cloudflare-deployment-status.json
          --output .release-artifacts/cloudflare-rollback-readiness.json
      - name: Rehearse rollback selection against an isolated preview config
        id: preview_rehearsal
        if: ${{ always() && steps.readiness.outcome == 'success' }}
        run: >-
          python scripts/rehearse_preview_rollback.py
          --versions .release-artifacts/cloudflare-versions.json
          --status .release-artifacts/cloudflare-deployment-status.json
          --site-dir pages-site
          --run-dry-run
          --output .release-artifacts/cloudflare-preview-rollback-rehearsal.json
      - name: Capture production gate outcomes
        if: ${{ always() }}
        env:
          PUBLIC_DATA: ${{ steps.public_data.outcome }}
          RANKING: ${{ steps.ranking.outcome }}
          STATIC_ASSETS: ${{ steps.static_assets.outcome }}
          STATIC_CONTRACTS: ${{ steps.static_contracts.outcome }}
          FOOTPRINT: ${{ steps.footprint.outcome }}
          DEPLOY: ${{ steps.deploy.outcome }}
          HTTP_SMOKE: ${{ steps.smoke.outcome }}
          MOBILE_RUNTIME: ${{ steps.mobile_runtime.outcome }}
          MOBILE_SMOKE: ${{ steps.mobile_smoke.outcome }}
          READINESS: ${{ steps.readiness.outcome }}
          PREVIEW_REHEARSAL: ${{ steps.preview_rehearsal.outcome }}
        run: |
          mkdir -p .release-artifacts
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          gates = [
              ("public-data", "pre_deploy", "PUBLIC_DATA"),
              ("event-ranking", "pre_deploy", "RANKING"),
              ("static-assets", "pre_deploy", "STATIC_ASSETS"),
              ("static-contracts", "pre_deploy", "STATIC_CONTRACTS"),
              ("asset-footprint", "pre_deploy", "FOOTPRINT"),
              ("deployment", "deployment", "DEPLOY"),
              ("http-smoke", "post_deploy", "HTTP_SMOKE"),
              ("mobile-runtime", "verification", "MOBILE_RUNTIME"),
              ("mobile-smoke", "post_deploy", "MOBILE_SMOKE"),
              ("rollback-readiness", "verification", "READINESS"),
              ("preview-rehearsal", "verification", "PREVIEW_REHEARSAL"),
          ]
          report = {
              "gates": [{"name": name, "phase": phase, "status": os.environ.get(key, "skipped")} for name, phase, key in gates],
              "schema_version": "civicledger-production-gates-v1",
          }
          Path(".release-artifacts/cloudflare-production-gates.json").write_text(json.dumps(report, indent=2, sort_keys=True) + "\n")
          readiness = Path(".release-artifacts/cloudflare-rollback-readiness.json")
          if not readiness.exists():
              readiness.write_text(json.dumps({"active_version_ids": [], "rollback_target_version_id": None}, indent=2) + "\n")
          PY
      - name: Generate rollback recommendation
        id: rollback_recommendation
        if: ${{ always() }}
        run: >-
          python scripts/recommend_production_rollback.py
          --gates .release-artifacts/cloudflare-production-gates.json
          --readiness .release-artifacts/cloudflare-rollback-readiness.json
          --output .release-artifacts/cloudflare-rollback-recommendation.json
      - name: Upload release evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: cloudflare-release-${{ steps.release.outputs.short_sha }}
          path: .release-artifacts/
          include-hidden-files: true
          retention-days: 90
      - name: Publish production release summary
        run: |
          echo "### Cloudflare production release" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: ${{ steps.release.outputs.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Production: https://civic-ledger.dan-a2c.workers.dev/" >> "$GITHUB_STEP_SUMMARY"
          echo "- Post-deployment smoke: passed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Mobile production smoke: passed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Rollback readiness: passed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Preview rollback rehearsal: passed" >> "$GITHUB_STEP_SUMMARY"
