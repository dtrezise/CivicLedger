name: Refresh Live Context Data

on:
  schedule:
    - cron: "23 10 * * *"
  workflow_dispatch:
    inputs:
      deep_sources:
        description: Refresh all Congress.gov involvement and indexed Senate report pages
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: python -m pip install -e ./backend
      - name: Start refresh telemetry clock and select refresh depth
        env:
          REQUESTED_DEEP_REFRESH: ${{ inputs.deep_sources || false }}
        run: |
          echo "REFRESH_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
          deep_refresh=false
          if [ "$REQUESTED_DEEP_REFRESH" = "true" ] || { [ "${{ github.event_name }}" = "schedule" ] && [ "$(date -u +%u)" = "7" ]; }; then
            deep_refresh=true
          fi
          echo "DEEP_REFRESH=$deep_refresh" >> "$GITHUB_ENV"
      - name: Verify required secrets are configured
        env:
          CONGRESS_GOV_API_KEY: ${{ secrets.CONGRESS_GOV_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: |
          test -n "$CONGRESS_GOV_API_KEY"
          test -n "$FRED_API_KEY"
          test -n "$TIINGO_API_KEY"
      - name: Refresh Congress.gov roster
        env:
          PYTHONPATH: backend
          CONGRESS_GOV_API_KEY: ${{ secrets.CONGRESS_GOV_API_KEY }}
        run: python scripts/build_congressional_officials_dataset.py
      - name: Rebuild public official roles
        env:
          PYTHONPATH: backend
        run: python scripts/build_public_officials_dataset.py
      - name: Refresh House Clerk disclosure index
        env:
          PYTHONPATH: backend
        run: python scripts/build_house_disclosure_index.py --start-year 2009
      - name: Ingest new current-year House PTRs
        env:
          PYTHONPATH: backend
        run: |
          current_year=$(date +%Y)
          python scripts/build_house_ptr_transactions.py --start-year "$current_year" --end-year "$current_year"
      - name: Refresh official federal event context
        env:
          PYTHONPATH: backend
          CONGRESS_GOV_API_KEY: ${{ secrets.CONGRESS_GOV_API_KEY }}
        run: python scripts/build_federal_events_dataset.py --start 2009-01-20
      - name: Refresh official event involvement deep sweep
        env:
          PYTHONPATH: backend
          CONGRESS_GOV_API_KEY: ${{ secrets.CONGRESS_GOV_API_KEY }}
          DEEP_SOURCES: ${{ inputs.deep_sources || false }}
        run: |
          if [ "$DEEP_SOURCES" = "true" ] || { [ "${{ github.event_name }}" = "schedule" ] && [ "$(date -u +%u)" = "7" ]; }; then
            python scripts/build_official_event_involvement.py
          else
            echo "Skipping deep official-involvement refresh."
          fi
      - name: Rebuild presidential OGE source index
        env:
          PYTHONPATH: backend
        run: python scripts/build_presidential_oge_disclosure_index.py
      - name: Refresh presidential OGE disclosure documents
        env:
          PYTHONPATH: backend
        run: python scripts/build_presidential_oge_documents.py --refresh
      - name: Refresh Senate disclosure index and weekly report pages
        env:
          PYTHONPATH: backend
          DEEP_SOURCES: ${{ inputs.deep_sources || false }}
        run: |
          deep_refresh=false
          senate_index_ok=true
          senate_index_backup="$RUNNER_TEMP/senate_disclosure_index.json"
          cp data/disclosures/senate_disclosure_index.json "$senate_index_backup"
          if [ "$DEEP_SOURCES" = "true" ] || { [ "${{ github.event_name }}" = "schedule" ] && [ "$(date -u +%u)" = "7" ]; }; then
            deep_refresh=true
          fi
          if ! python scripts/build_senate_disclosure_index.py --all-senators --acknowledge-senate-terms; then
            senate_index_ok=false
          elif ! python - <<'PY'
          import json
          from pathlib import Path

          summary = json.loads(Path("data/disclosures/senate_disclosure_index.json").read_text())["summary"]
          if summary.get("document_count", 0) < 2_100 or summary.get("matched_document_count", 0) < 1_800:
              raise SystemExit("Refreshed Senate index did not meet the release coverage floor.")
          PY
          then
            senate_index_ok=false
          fi
          if [ "$senate_index_ok" = "false" ]; then
            cp "$senate_index_backup" data/disclosures/senate_disclosure_index.json
            if [ "$deep_refresh" = "true" ]; then
              exit 1
            fi
            echo "::warning::Senate portal refresh failed or returned incomplete coverage; restored the committed hash-backed index and transaction snapshot."
            test -s data/disclosures/senate_disclosure_index.json
            test -s data/disclosures/senate_ptr_transactions.json
          fi
          if [ "$deep_refresh" = "true" ]; then
            python scripts/build_senate_ptr_transactions.py --all-indexed --acknowledge-senate-terms
          else
            echo "Skipping deep Senate report-page refresh."
          fi
      - name: Rebuild disclosure source pipeline artifacts
        env:
          PYTHONPATH: backend
        run: |
          python scripts/archive_disclosure_documents.py
          python scripts/build_executive_disclosure_manifest.py
          python scripts/build_judicial_disclosure_manifest.py
          python scripts/build_disclosure_ingestion_queue.py
          python scripts/build_disclosure_ocr_priority_batches.py
          python scripts/build_disclosure_amendment_reconciliation.py
          python scripts/build_reviewed_disclosure_promotions.py
          python scripts/build_disclosure_retrieval_batches.py
          python scripts/build_production_trade_promotions.py
          python scripts/build_disclosure_completeness_dashboard.py
          python scripts/build_source_staleness_alerts.py
      - name: Install disclosure OCR runtime when missing
        run: |
          if ! command -v tesseract >/dev/null || ! command -v pdftoppm >/dev/null; then
            sudo apt-get update
            sudo apt-get install -y poppler-utils tesseract-ocr
          fi
      - name: Process prioritized disclosure OCR evidence
        env:
          PYTHONPATH: backend
        run: python scripts/build_disclosure_ocr_results.py --acknowledge-senate-terms
      - name: Refresh FRED trade context
        env:
          PYTHONPATH: backend
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/build_fred_context_dataset.py --start 2009-01-20
      - name: Refresh Tiingo market prices
        env:
          PYTHONPATH: backend
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: |
          snapshot="$RUNNER_TEMP/market_prices.json"
          cp data/context/market_prices.json "$snapshot"
          if ! python scripts/build_market_price_dataset.py --start 2009-01-20; then
            cp "$snapshot" data/context/market_prices.json
            if [ "$DEEP_REFRESH" = "true" ]; then
              exit 1
            fi
            echo "::warning::Tiingo equity refresh failed; restored the committed validated market-price snapshot."
          fi
          test -s data/context/market_prices.json
      - name: Refresh Tiingo crypto prices
        env:
          PYTHONPATH: backend
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: |
          snapshot="$RUNNER_TEMP/crypto_prices.json"
          cp data/context/crypto_prices.json "$snapshot"
          if ! python scripts/build_crypto_price_dataset.py --start 2009-01-20; then
            cp "$snapshot" data/context/crypto_prices.json
            if [ "$DEEP_REFRESH" = "true" ]; then
              exit 1
            fi
            echo "::warning::Tiingo crypto refresh failed; restored the committed validated crypto-price snapshot."
          fi
          test -s data/context/crypto_prices.json
      - name: Check market price coverage
        run: python scripts/check_market_price_dataset.py
      - name: Rebuild asset resolution and market reaction context
        env:
          PYTHONPATH: backend
        run: |
          python scripts/build_asset_resolution_dataset.py
          python scripts/build_trade_market_reactions.py
          python scripts/evaluate_event_ranking.py
      - name: Refresh official SEC issuer filing context
        env:
          PYTHONPATH: backend
          SEC_EDGAR_USER_AGENT: CivicLedger github-actions[bot]@users.noreply.github.com
        run: |
          sec_refresh_failed=false
          if ! python scripts/build_sec_issuer_aliases.py --refresh; then
            sec_refresh_failed=true
          elif ! python scripts/build_sec_filing_events.py --refresh; then
            sec_refresh_failed=true
          fi
          if [ "$sec_refresh_failed" = "true" ]; then
            if [ "$DEEP_REFRESH" = "true" ]; then
              exit 1
            fi
            echo "::warning::SEC EDGAR refresh failed; retaining the committed hash-backed issuer and filing context."
            test -s data/context/sec_issuer_aliases.json
            test -s data/context/sec_filing_events.json
          fi
          python scripts/build_primary_source_context.py
      - name: Rebuild canonical entities and source snapshots
        env:
          PYTHONPATH: backend
        run: |
          python scripts/build_entity_reference_dataset.py
          python scripts/build_source_snapshot_index.py
      - name: Check source freshness
        run: python scripts/check_source_freshness.py
      - name: Rebuild Pages data
        env:
          PYTHONPATH: backend
        run: python scripts/build_pages_dataset.py
      - name: Validate public release contract
        run: python scripts/check_public_release_dataset.py
      - name: Validate static release gates
        run: |
          python scripts/check_release_accessibility.py
          python scripts/check_release_static_contract.py
          python scripts/check_release_links.py
          python scripts/check_release_performance.py
          python scripts/check_release_determinism.py
          python scripts/build_release_checksum_inventory.py
          python scripts/build_release_checksum_inventory.py --check
      - name: Record weekly public-corpus growth and R2 simulation
        if: ${{ github.event_name == 'workflow_dispatch' || env.DEEP_REFRESH == 'true' }}
        run: |
          python scripts/report_public_corpus_growth.py
          python scripts/simulate_r2_public_partition_migration.py
      - name: Record successful full-refresh telemetry
        env:
          PYTHONPATH: backend
        run: >-
          python scripts/build_source_refresh_telemetry.py
          --record-run-id "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          --started-at "$REFRESH_STARTED_AT"
          --completed-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          --status success
      - name: Commit refreshed generated data
        run: |
          if git diff --quiet -- data pages-site/data pages-site/release-checksums.json docs/metrics/public_corpus_growth_history.json docs/metrics/r2_public_partition_migration_simulation.json backend/tests/fixtures/parsers/oge_public_sample_fixture.json; then
            echo "No generated data changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data pages-site/data pages-site/release-checksums.json docs/metrics/public_corpus_growth_history.json docs/metrics/r2_public_partition_migration_simulation.json backend/tests/fixtures/parsers/oge_public_sample_fixture.json
            generated_base=$(git rev-parse HEAD)
            git commit -m "Refresh live context data"
            target_branch="${GITHUB_REF_NAME:-main}"
            max_attempts=3
            published=false
            for attempt in $(seq 1 "$max_attempts"); do
              echo "Synchronizing generated-data commit with origin/$target_branch (attempt $attempt/$max_attempts)."
              if ! git fetch --prune origin "$target_branch"; then
                echo "::warning::Could not fetch origin/$target_branch for generated-data publish attempt $attempt."
              elif ! git rebase "origin/$target_branch"; then
                git rebase --abort 2>/dev/null || true
                git reset --mixed "$generated_base"
                echo "::error::Generated-data commit conflicts with origin/$target_branch; refusing to publish unresolved generated data."
                exit 1
              elif git push origin "HEAD:$target_branch"; then
                published=true
                break
              else
                echo "::warning::Origin changed during generated-data publish attempt $attempt."
              fi
              if [ "$attempt" -lt "$max_attempts" ]; then
                sleep $((attempt * 2))
              fi
            done
            if [ "$published" != "true" ]; then
              git reset --mixed "$generated_base"
              echo "::error::Generated-data publish failed after $max_attempts bounded synchronization attempts; no generated data was published."
              exit 1
            fi
          fi
      - name: Write deployed Pages release metadata
        run: >-
          python scripts/write_release_metadata.py
          --commit "$(git rev-parse HEAD)"
          --repository "${{ github.repository }}"
          --run-id "${{ github.run_id }}"
      - name: Record failed refresh telemetry
        if: ${{ failure() }}
        env:
          PYTHONPATH: backend
        run: >-
          python scripts/build_source_refresh_telemetry.py
          --record-run-id "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          --started-at "$REFRESH_STARTED_AT"
          --completed-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          --status failed
          --failure-count 1
      - name: Persist failed refresh telemetry
        if: ${{ failure() }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/operations/source_refresh_runs.json data/operations/source_refresh_telemetry.json
          if git commit -m "Record failed live context refresh"; then
            target_branch="${GITHUB_REF_NAME:-main}"
            published=false
            for attempt in $(seq 1 3); do
              echo "Synchronizing failed-refresh telemetry with origin/$target_branch (attempt $attempt/3)."
              if ! git fetch --prune origin "$target_branch"; then
                echo "::warning::Could not fetch origin/$target_branch for telemetry publish attempt $attempt."
              elif ! git rebase --autostash "origin/$target_branch"; then
                git rebase --abort 2>/dev/null || true
                echo "::error::Failed-refresh telemetry conflicts with origin/$target_branch."
                exit 1
              elif git push origin "HEAD:$target_branch"; then
                published=true
                break
              else
                echo "::warning::Origin changed during telemetry publish attempt $attempt."
              fi
              if [ "$attempt" -lt 3 ]; then
                sleep $((attempt * 2))
              fi
            done
            if [ "$published" != "true" ]; then
              echo "::error::Failed-refresh telemetry publish exhausted three bounded attempts."
              exit 1
            fi
          else
            echo "No failed-refresh telemetry changes to commit."
          fi
      - uses: actions/configure-pages@v6
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v5
        with:
          path: pages-site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: refresh
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
