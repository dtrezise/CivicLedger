name: Refresh Live Context Data

on:
  schedule:
    - cron: "23 10 * * *"
  workflow_dispatch:
    inputs:
      deep_sources:
        description: Refresh all Congress.gov involvement and indexed Senate report pages
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: python -m pip install -e ./backend
      - name: Start refresh telemetry clock
        run: echo "REFRESH_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
      - name: Verify required secrets are configured
        env:
          CONGRESS_GOV_API_KEY: ${{ secrets.CONGRESS_GOV_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: |
          test -n "$CONGRESS_GOV_API_KEY"
          test -n "$FRED_API_KEY"
          test -n "$TIINGO_API_KEY"
      - name: Refresh Congress.gov roster
        env:
          PYTHONPATH: backend
          CONGRESS_GOV_API_KEY: ${{ secrets.CONGRESS_GOV_API_KEY }}
        run: python scripts/build_congressional_officials_dataset.py
      - name: Rebuild public official roles
        env:
          PYTHONPATH: backend
        run: python scripts/build_public_officials_dataset.py
      - name: Refresh House Clerk disclosure index
        env:
          PYTHONPATH: backend
        run: python scripts/build_house_disclosure_index.py --start-year 2009
      - name: Ingest new current-year House PTRs
        env:
          PYTHONPATH: backend
        run: |
          current_year=$(date +%Y)
          python scripts/build_house_ptr_transactions.py --start-year "$current_year" --end-year "$current_year"
      - name: Refresh official federal event context
        env:
          PYTHONPATH: backend
          CONGRESS_GOV_API_KEY: ${{ secrets.CONGRESS_GOV_API_KEY }}
        run: python scripts/build_federal_events_dataset.py --start 2009-01-20
      - name: Refresh official event involvement deep sweep
        env:
          PYTHONPATH: backend
          CONGRESS_GOV_API_KEY: ${{ secrets.CONGRESS_GOV_API_KEY }}
          DEEP_SOURCES: ${{ inputs.deep_sources || false }}
        run: |
          if [ "$DEEP_SOURCES" = "true" ] || { [ "${{ github.event_name }}" = "schedule" ] && [ "$(date -u +%u)" = "7" ]; }; then
            python scripts/build_official_event_involvement.py
          else
            echo "Skipping deep official-involvement refresh."
          fi
      - name: Rebuild presidential OGE source index
        env:
          PYTHONPATH: backend
        run: python scripts/build_presidential_oge_disclosure_index.py
      - name: Refresh presidential OGE disclosure documents
        env:
          PYTHONPATH: backend
        run: python scripts/build_presidential_oge_documents.py --refresh
      - name: Refresh Senate disclosure index and weekly report pages
        env:
          PYTHONPATH: backend
          DEEP_SOURCES: ${{ inputs.deep_sources || false }}
        run: |
          deep_refresh=false
          if [ "$DEEP_SOURCES" = "true" ] || { [ "${{ github.event_name }}" = "schedule" ] && [ "$(date -u +%u)" = "7" ]; }; then
            deep_refresh=true
          fi
          if ! python scripts/build_senate_disclosure_index.py --all-senators --acknowledge-senate-terms; then
            if [ "$deep_refresh" = "true" ]; then
              exit 1
            fi
            echo "::warning::Senate portal refresh failed; retaining the committed hash-backed index and transaction snapshot."
            test -s data/disclosures/senate_disclosure_index.json
            test -s data/disclosures/senate_ptr_transactions.json
          fi
          if [ "$deep_refresh" = "true" ]; then
            python scripts/build_senate_ptr_transactions.py --all-indexed --acknowledge-senate-terms
          else
            echo "Skipping deep Senate report-page refresh."
          fi
      - name: Rebuild disclosure source pipeline artifacts
        env:
          PYTHONPATH: backend
        run: |
          python scripts/archive_disclosure_documents.py
          python scripts/build_executive_disclosure_manifest.py
          python scripts/build_judicial_disclosure_manifest.py
          python scripts/build_disclosure_ingestion_queue.py
          python scripts/build_disclosure_ocr_priority_batches.py
          python scripts/build_disclosure_amendment_reconciliation.py
          python scripts/build_reviewed_disclosure_promotions.py
          python scripts/build_disclosure_retrieval_batches.py
          python scripts/build_production_trade_promotions.py
          python scripts/build_disclosure_completeness_dashboard.py
          python scripts/build_source_staleness_alerts.py
      - name: Install disclosure OCR runtime when missing
        run: |
          if ! command -v tesseract >/dev/null || ! command -v pdftoppm >/dev/null; then
            sudo apt-get update
            sudo apt-get install -y poppler-utils tesseract-ocr
          fi
      - name: Process prioritized disclosure OCR evidence
        env:
          PYTHONPATH: backend
        run: python scripts/build_disclosure_ocr_results.py --acknowledge-senate-terms
      - name: Refresh FRED trade context
        env:
          PYTHONPATH: backend
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/build_fred_context_dataset.py --start 2009-01-20
      - name: Refresh Tiingo market prices
        env:
          PYTHONPATH: backend
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: python scripts/build_market_price_dataset.py --start 2009-01-20
      - name: Refresh Tiingo crypto prices
        env:
          PYTHONPATH: backend
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: python scripts/build_crypto_price_dataset.py --start 2009-01-20
      - name: Check market price coverage
        run: python scripts/check_market_price_dataset.py
      - name: Rebuild asset resolution and market reaction context
        env:
          PYTHONPATH: backend
        run: |
          python scripts/build_asset_resolution_dataset.py
          python scripts/build_trade_market_reactions.py
          python scripts/evaluate_event_ranking.py
      - name: Refresh official SEC issuer filing context
        env:
          PYTHONPATH: backend
          SEC_EDGAR_USER_AGENT: CivicLedger github-actions[bot]@users.noreply.github.com
          DEEP_SOURCES: ${{ inputs.deep_sources || false }}
        run: |
          sec_refresh_failed=false
          if ! python scripts/build_sec_issuer_aliases.py --refresh; then
            sec_refresh_failed=true
          elif ! python scripts/build_sec_filing_events.py --refresh; then
            sec_refresh_failed=true
          fi
          if [ "$sec_refresh_failed" = "true" ]; then
            if [ "$DEEP_SOURCES" = "true" ]; then
              exit 1
            fi
            echo "::warning::SEC EDGAR refresh failed; retaining the committed hash-backed issuer and filing context."
            test -s data/context/sec_issuer_aliases.json
            test -s data/context/sec_filing_events.json
          fi
          python scripts/build_primary_source_context.py
      - name: Rebuild canonical entities and source snapshots
        env:
          PYTHONPATH: backend
        run: |
          python scripts/build_entity_reference_dataset.py
          python scripts/build_source_snapshot_index.py
      - name: Check source freshness
        run: python scripts/check_source_freshness.py
      - name: Rebuild Pages data
        env:
          PYTHONPATH: backend
        run: python scripts/build_pages_dataset.py
      - name: Validate public release contract
        run: python scripts/check_public_release_dataset.py
      - name: Validate static release gates
        run: |
          python scripts/check_release_accessibility.py
          python scripts/check_release_static_contract.py
          python scripts/check_release_links.py
          python scripts/check_release_performance.py
          python scripts/check_release_determinism.py
          python scripts/build_release_checksum_inventory.py
          python scripts/build_release_checksum_inventory.py --check
      - name: Record successful full-refresh telemetry
        env:
          PYTHONPATH: backend
        run: >-
          python scripts/build_source_refresh_telemetry.py
          --record-run-id "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          --started-at "$REFRESH_STARTED_AT"
          --completed-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          --status success
      - name: Commit refreshed generated data
        run: |
          if git diff --quiet -- data pages-site/data pages-site/release-checksums.json backend/tests/fixtures/parsers/oge_public_sample_fixture.json; then
            echo "No generated data changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data pages-site/data pages-site/release-checksums.json backend/tests/fixtures/parsers/oge_public_sample_fixture.json
            git commit -m "Refresh live context data"
            git push
          fi
      - name: Record failed refresh telemetry
        if: ${{ failure() }}
        env:
          PYTHONPATH: backend
        run: >-
          python scripts/build_source_refresh_telemetry.py
          --record-run-id "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          --started-at "$REFRESH_STARTED_AT"
          --completed-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          --status failed
          --failure-count 1
      - name: Persist failed refresh telemetry
        if: ${{ failure() }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/operations/source_refresh_runs.json data/operations/source_refresh_telemetry.json
          git commit -m "Record failed live context refresh" || true
          git push
      - uses: actions/configure-pages@v6
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v5
        with:
          path: pages-site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: refresh
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
