services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: civicledger
      POSTGRES_USER: civicledger
      POSTGRES_PASSWORD: civicledger
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civicledger"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://civicledger:civicledger@db:5432/civicledger
      DATABASE_URL_SYNC: postgresql://civicledger:civicledger@db:5432/civicledger
      CORS_ORIGINS: '["http://localhost:3000"]'
      CONGRESS_GOV_API_KEY: ${CONGRESS_GOV_API_KEY:-}
      FRED_API_KEY: ${FRED_API_KEY:-}
      TIINGO_API_KEY: ${TIINGO_API_KEY:-}
      FEC_API_KEY: ${FEC_API_KEY:-}
      DATA_GOV_API_KEY: ${DATA_GOV_API_KEY:-}
      CENSUS_API_KEY: ${CENSUS_API_KEY:-}
      BLS_API_KEY: ${BLS_API_KEY:-}
      USASPENDING_API_DOCS_URL: ${USASPENDING_API_DOCS_URL:-https://api.usaspending.gov/docs/endpoints}
      TREASURY_FISCALDATA_API_DOCS_URL: ${TREASURY_FISCALDATA_API_DOCS_URL:-https://fiscaldata.treasury.gov/api-documentation/}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - sharecard_renders:/app/renders

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: /api
      API_URL_INTERNAL: http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
  sharecard_renders:
