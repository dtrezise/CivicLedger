services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: civicledger
      POSTGRES_USER: civicledger
      POSTGRES_PASSWORD: civicledger
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civicledger"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://civicledger:civicledger@db:5432/civicledger
      DATABASE_URL_SYNC: postgresql://civicledger:civicledger@db:5432/civicledger
      CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - sharecard_renders:/app/renders

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: /api
      API_URL_INTERNAL: http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
  sharecard_renders:
